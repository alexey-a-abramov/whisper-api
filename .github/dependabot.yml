# https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One grouped PR for routine updates keeps noise down.
      production:
        dependency-type: production
      development:
        dependency-type: development
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
